services:
  postgres:
    image: postgres:16-alpine
    container_name: sag-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: sag
      POSTGRES_PASSWORD: sag
      POSTGRES_DB: sag
    ports:
      - '5432:5432'
    volumes:
      - sag-postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U sag -d sag']
      interval: 5s
      timeout: 5s
      retries: 10

  app:
    build:
      context: .
      dockerfile: docker/Dockerfile
    container_name: sag-app
    restart: unless-stopped
    environment:
      NODE_ENV: production
      PORT: '3000'
      HOST: '0.0.0.0'
      DATABASE_URL: 'postgresql://sag:sag@postgres:5432/sag?schema=public'
      LOG_LEVEL: info
    ports:
      - '3000:3000'
    depends_on:
      postgres:
        condition: service_healthy

volumes:
  sag-postgres-data:
    name: sag-postgres-data
